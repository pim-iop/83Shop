<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-th="ส่งไปยังห้องของคุณ" data-en="Send to Your Room">ส่งไปยังห้องของคุณ</title>
    <style>
        @font-face {
            font-family: 'Satoshi-Regular';
            src: url('{{ url_for("static", filename="fonts/Satoshi-Regular.ttf") }}') format('truetype');
        }
        @font-face {
            font-family: 'Thai';
            src: url('{{ url_for("static", filename="fonts/ไทย.ttf") }}') format('truetype');
        }
        body {
            font-family: 'Thai', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .lang-buttons {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }
        .lang-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            background: #fff;
            color: #333;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            transition: all 0.3s ease;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }
        .lang-buttons button:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }
        .lang-buttons button.active {
            background: linear-gradient(135deg, #ff6b35, #e55a2b);
            color: white;
            box-shadow: 0 5px 15px rgba(255,107,53,0.3);
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 1.8em;
        }
        input, textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1em;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #ff6b35;
            box-shadow: 0 0 0 2px rgba(255,107,53,0.2);
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff6b35, #e55a2b);
            border: none;
            color: white;
            border-radius: 25px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255,107,53,0.3);
        }
        button:hover {
            background: linear-gradient(135deg, #e55a2b, #d14d25);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255,107,53,0.4);
        }
    </style>
</head>
<body>
    <div class="lang-buttons">
        <button id="th-btn" class="active" onclick="setLanguage('th')">ไทย</button>
        <button id="en-btn" onclick="setLanguage('en')">Eng</button>
    </div>
    <form class="container" action="/send" method="POST">
        <h2 data-th="ส่งอาหารไปยังห้อง" data-en="Send Food to Room">ส่งอาหารไปยังห้อง</h2>
        <input type="text" name="room" placeholder="ใส่หมายเลขห้อง" data-th="ใส่หมายเลขห้อง" data-en="Enter room number" required>
        <textarea name="message" placeholder="ใส่รายการอาหาร" data-th="ใส่รายการอาหาร" data-en="Enter food items" required></textarea>
        <button type="submit" data-th="ส่ง" data-en="Send">ส่ง</button>
    </form>
    <script>
        function setLanguage(lang) {
            document.documentElement.lang = lang;
            document.querySelector('title').textContent = document.querySelector('title').getAttribute('data-' + lang);
            document.querySelectorAll('[data-' + lang + ']').forEach(el => {
                el.textContent = el.getAttribute('data-' + lang);
            });
            document.body.style.fontFamily = lang === 'en' ? "'Satoshi-Regular', sans-serif" : "'Thai', sans-serif";
            document.querySelectorAll('.lang-buttons button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(lang + '-btn').classList.add('active');
        }
    </script>
</body>
</html>
</html>
